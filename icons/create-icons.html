<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generador de íconos — Packing List Manager</title>
<style>
  body { font-family: system-ui, sans-serif; padding: 40px; background: #f3f4f6; }
  h2   { color: #1a56db; }
  .preview { display: flex; gap: 24px; margin: 24px 0; align-items: flex-end; }
  canvas   { border-radius: 22%; box-shadow: 0 4px 12px rgba(0,0,0,.2); }
  button   {
    padding: 10px 24px; background: #1a56db; color: #fff;
    border: none; border-radius: 8px; font-size: 15px; cursor: pointer;
  }
  button:hover { background: #1e429f; }
  p { color: #6b7280; max-width: 480px; line-height: 1.5; }
  .ok { color: #0e9f6e; font-weight: 700; display: none; margin-top: 12px; }
</style>
</head>
<body>
<h2>Generador de íconos PWA</h2>
<p>
  Este script genera los archivos <code>icon-192.png</code> e <code>icon-512.png</code>
  necesarios para la instalación de la PWA.
  Hacé clic en <strong>Generar y descargar</strong>, guardá cada archivo en la
  carpeta <code>icons/</code> del proyecto.
</p>

<div class="preview">
  <div>
    <canvas id="c192" width="192" height="192"></canvas>
    <p style="text-align:center;font-size:12px;color:#6b7280;margin:4px 0">192 × 192</p>
  </div>
  <div>
    <canvas id="c512" width="512" height="512"></canvas>
    <p style="text-align:center;font-size:12px;color:#6b7280;margin:4px 0">512 × 512</p>
  </div>
</div>

<button onclick="generate()">⬇ Generar y descargar íconos</button>
<div class="ok" id="ok">✓ Archivos descargados — guardálos en la carpeta <code>icons/</code></div>

<script>
function drawIcon(canvas) {
  const s   = canvas.width;
  const ctx = canvas.getContext('2d');
  const r   = s * 0.12; // radio de esquinas

  // Fondo azul redondeado
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#1a56db';
  ctx.fill();

  // Caja blanca (cuerpo del paquete)
  const bx = s * 0.20, by = s * 0.30;
  const bw = s * 0.60, bh = s * 0.45;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, s * 0.04);
  ctx.fill();

  // Tapa del paquete (trapecio)
  ctx.fillStyle = '#dbeafe';
  ctx.beginPath();
  ctx.moveTo(bx + bw * 0.08, by);
  ctx.lineTo(bx + bw * 0.92, by);
  ctx.lineTo(bx + bw * 0.78, by - bh * 0.22);
  ctx.lineTo(bx + bw * 0.22, by - bh * 0.22);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#1a56db';
  ctx.lineWidth   = s * 0.025;
  ctx.stroke();

  // Líneas de la caja
  ctx.strokeStyle = '#1a56db';
  ctx.lineWidth   = s * 0.025;
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, s * 0.04);
  ctx.stroke();

  // Cinta horizontal
  ctx.strokeStyle = '#1a56db';
  ctx.lineWidth   = s * 0.035;
  ctx.beginPath();
  ctx.moveTo(bx, by + bh * 0.45);
  ctx.lineTo(bx + bw, by + bh * 0.45);
  ctx.stroke();

  // Lazo en la tapa
  ctx.strokeStyle = '#1a56db';
  ctx.lineWidth   = s * 0.03;
  ctx.beginPath();
  ctx.moveTo(s * 0.50, by - bh * 0.22);
  ctx.lineTo(s * 0.50, by);
  ctx.stroke();

  // Letras "PL"
  ctx.fillStyle   = '#1a56db';
  ctx.font        = `bold ${s * 0.15}px system-ui, sans-serif`;
  ctx.textAlign   = 'center';
  ctx.textBaseline= 'middle';
  ctx.fillText('PL', s * 0.50, by + bh * 0.72);
}

// Dibuja preview al cargar
window.addEventListener('DOMContentLoaded', () => {
  drawIcon(document.getElementById('c192'));
  drawIcon(document.getElementById('c512'));
});

function download(canvas, filename) {
  const a    = document.createElement('a');
  a.download = filename;
  a.href     = canvas.toDataURL('image/png');
  a.click();
}

function generate() {
  const c192 = document.getElementById('c192');
  const c512 = document.getElementById('c512');
  drawIcon(c192);
  drawIcon(c512);
  setTimeout(() => download(c192, 'icon-192.png'), 100);
  setTimeout(() => download(c512, 'icon-512.png'), 400);
  document.getElementById('ok').style.display = 'block';
}
</script>
</body>
</html>
